name: Generate Receita Token
on: 
  workflow_dispatch: # This allows n8n to trigger it via API

jobs:
  run-token-gen:
    runs-on: windows-latest # Your "Lightweight" environment
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install zendriver requests

      - name: Run Generator
        run: python zen-token.py
        env:
          PYTHONUNBUFFERED: 1