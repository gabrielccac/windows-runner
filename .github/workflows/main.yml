name: Generate Receita Token
on: 
  workflow_dispatch: # This allows n8n to trigger it via API

jobs:
  run-token-gen:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Generator
        run: python zen-token.py
        env:
          PYTHONUTF8: 1
          PYTHONUNBUFFERED: 1
          HEADLESS: "false"