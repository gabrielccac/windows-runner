name: Generate Receita Token
on: 
  workflow_dispatch: # This allows n8n to trigger it via API

jobs:
  run-token-gen:
    runs-on: windows-latest # Your "Lightweight" environment
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: pip install zendriver

      - name: Run Generator
        run: python zen-token.py
        env:
          PYTHONUTF8: 1
          PYTHONUNBUFFERED: 1